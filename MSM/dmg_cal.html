<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傷害提升收益計算工具</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; padding: 20px; color: #333; line-height: 1.5; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        
        .formula-box { background: #f1f8ff; border-left: 5px solid #3498db; padding: 15px; margin: 20px 0; border-radius: 4px; }
        code { background: #fff; padding: 5px; border: 1px solid #d1d1d1; border-radius: 3px; display: block; margin-top: 5px; color: #c62828; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.85em; font-weight: bold; margin-bottom: 5px; color: #546e7a; }
        input[type="number"] { padding: 12px; border: 1px solid #cfd8dc; border-radius: 8px; font-size: 1em; outline: none; }
        
        /* Buff 區塊樣式 */
        .buff-section { background: #f9fbe7; border-radius: 10px; padding: 20px; border: 1px solid #dce775; margin-bottom: 20px; }
        .buff-title { font-weight: bold; color: #827717; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .buff-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .buff-item { background: white; padding: 8px 12px; border-radius: 6px; border: 1px solid #e0e0e0; display: flex; align-items: center; font-size: 0.9em; cursor: pointer; }
        .buff-item input { margin-right: 10px; }
        .buff-btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-buff { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-50 { background: #689f38; }
        .btn-30 { background: #afb42b; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-size: 1em; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-calc { background: #3498db; color: white; }
        .btn-default { background: #90a4ae; color: white; }
        
        .result-section { margin-top: 25px; padding: 20px; background: #f8f9fa; border-radius: 10px; border: 1px solid #e0e0e0; }
        .total-damage { font-size: 1.4em; color: #c62828; font-weight: bold; text-align: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #cfd8dc; }
        .high-gain { color: #2e7d32; font-weight: bold; }

        .compare-section { margin-top: 30px; padding: 20px; background: #fff3e0; border-radius: 10px; border: 1px dotted #ffb74d; }
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .compare-box { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ffe0b2; }
        .winner-box { background: #e8f5e9; border: 2px solid #4caf50; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>傷害提升收益計算工具</h2>

    <div class="formula-box">
        <strong>當前計算公式解析：</strong>
        <code>Damage = [ATK] * [Skill%] * [1 + DMG%] * [1 + Final% + SkillFinal%] * [1 + ATK% + (Skill% * Boss%)] * [1 + CritDMG% + 0.2]</code>
    </div>
    
    <div class="grid">
        <div class="input-group"><label>表功 ATK</label><input type="number" id="atk" placeholder="填入數值"></div>
        <div class="input-group"><label>技能倍率 Skill DMG (%)</label><input type="number" id="skill_dmg" placeholder="填入數值"></div>
        <div class="input-group"><label>物/魔傷 DMG Increase (%)</label><input type="number" id="dmg_inc" placeholder="填入數值"></div>
        <div class="input-group"><label>終傷 Final DMG (%)</label><input type="number" id="final_dmg" placeholder="填入數值"></div>
        <div class="input-group"><label>技能終傷 Skill Final (%)</label><input type="number" id="skill_final_dmg" placeholder="填入數值"></div>
        <div class="input-group"><label>物/魔攻 ATK Increase (%)</label><input type="number" id="atk_inc" placeholder="填入數值"></div>
        <div class="input-group"><label>B傷 Boss ATK (%)</label><input type="number" id="boss_atk" placeholder="填入數值"></div>
        <div class="input-group"><label>爆傷 Crit DMG (%)</label><input type="number" id="crit_dmg" placeholder="填入數值"></div>
    </div>

    <div class="buff-section">
        <div class="buff-title">藥品 Buff 勾選</div>
        <div class="buff-grid">
            <label class="buff-item"><input type="checkbox" id="buff_shrimp" data-type="boss" data-val="50" onchange="mutex('buff_shrimp','buff_chicken')">炸蝦 (B傷50%)</label>
            <label class="buff-item"><input type="checkbox" id="buff_yogurt" data-type="atk_inc" data-val="50" onchange="mutex('buff_yogurt','buff_buckwheat')">優格/葡萄汁 (攻50%)</label>
            <label class="buff-item"><input type="checkbox" id="buff_chestnut" data-type="crit" data-val="30">栗子 (爆傷30%)</label>
            <label class="buff-item"><input type="checkbox" id="buff_candy" data-type="dmg" data-val="30">糖果盒/棒棒糖 (傷30%)</label>
            <label class="buff-item"><input type="checkbox" id="buff_chicken" data-type="boss" data-val="30" onchange="mutex('buff_chicken','buff_shrimp')">小雞餅乾 (B傷30%)</label>
            <label class="buff-item"><input type="checkbox" id="buff_buckwheat" data-type="atk_inc" data-val="30" onchange="mutex('buff_buckwheat','buff_yogurt')">蕎麥/魷魚乾 (攻30%)</label>
            <label class="buff-item"><input type="checkbox" id="buff_pork" data-type="dmg" data-val="20">炒豬肉/嫩寶 (傷20%)</label>
            <label class="buff-item"><input type="checkbox" id="buff_jelly" data-type="boss" data-val="20">海蜇皮 (B傷20%)</label>
        </div>
        <div class="buff-btn-group">
            <button class="btn-buff btn-50" onclick="applyPreset('50')">套用 50 藥</button>
            <button class="btn-buff btn-30" onclick="applyPreset('30')">套用 30 藥</button>
            <button class="btn-buff" style="background:#607d8b" onclick="clearBuffs()">清空 Buff</button>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-calc" onclick="calculate()">計算目前收益排行</button>
        <button class="btn-default" onclick="fillDefault()">填入範例數值</button>
    </div>

    <div id="results" class="result-section" style="display:none;">
        <div class="total-damage" id="total_damage_display"></div>
        <table id="analysis_table">
            <thead>
                <tr>
                    <th>屬性排行 (提升 1 單位收益)</th>
                    <th>總傷害增幅 (%)</th>
                </tr>
            </thead>
            <tbody id="analysis_body"></tbody>
        </table>

        <div class="compare-section">
            <h3 style="margin-top:0; color: #e65100;">屬性二選一對比模擬</h3>
            <div class="compare-grid">
                <div class="compare-box">
                    <label>方案 A 增加屬性</label>
                    <select id="optA_type" style="width:100%; margin-bottom:10px; padding:5px;"></select>
                    <input type="number" id="optA_val" placeholder="增加量" style="width:90%;">
                </div>
                <div class="compare-box">
                    <label>方案 B 增加屬性</label>
                    <select id="optB_type" style="width:100%; margin-bottom:10px; padding:5px;"></select>
                    <input type="number" id="optB_val" placeholder="增加量" style="width:90%;">
                </div>
            </div>
            <button class="btn-calc" style="background: #f57c00; margin-top:15px;" onclick="compareEquip()">開始對比</button>
            <div id="compare_result" class="winner-box" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
const keys = [
    { id: 'atk', name: '表攻 ATK' },
    { id: 'skill_dmg', name: '技能倍率 Skill DMG (%)' },
    { id: 'dmg_inc', name: '物/魔傷 DMG Increase (%)' },
    { id: 'final_dmg', name: '終傷 Final DMG (%)' },
    { id: 'skill_final_dmg', name: '技能終傷 Skill Final DMG (%)' },
    { id: 'atk_inc', name: '物/魔攻 ATK Increase (%)' },
    { id: 'boss_atk', name: 'B攻 Boss ATK (%)' },
    { id: 'crit_dmg', name: '爆傷 Crit DMG (%)' }
];

window.onload = () => {
    const selA = document.getElementById('optA_type');
    const selB = document.getElementById('optB_type');
    keys.forEach(k => {
        selA.add(new Option(k.name, k.id));
        selB.add(new Option(k.name, k.id));
    });
};

// 互斥邏輯：若勾選 A 則取消 B
function mutex(sourceId, targetId) {
    if (document.getElementById(sourceId).checked) {
        document.getElementById(targetId).checked = false;
    }
}

// 清空所有 Buff
function clearBuffs() {
    document.querySelectorAll('.buff-grid input').forEach(i => i.checked = false);
}

// 一鍵套用預設
function applyPreset(type) {
    clearBuffs();
    if (type === '50') {
        document.getElementById('buff_shrimp').checked = true;
        document.getElementById('buff_yogurt').checked = true;
    } else {
        document.getElementById('buff_chicken').checked = true;
        document.getElementById('buff_buckwheat').checked = true;
    }
    document.getElementById('buff_chestnut').checked = true;
    document.getElementById('buff_candy').checked = true;
    document.getElementById('buff_pork').checked = true;
    document.getElementById('buff_jelly').checked = true;
}

function fillDefault() {
    document.getElementById('atk').value = 78129;
    document.getElementById('skill_dmg').value = 243;
    document.getElementById('dmg_inc').value = 279.4;
    document.getElementById('final_dmg').value = 169.6;
    document.getElementById('skill_final_dmg').value = 140;
    document.getElementById('atk_inc').value = 187.4;
    document.getElementById('boss_atk').value = 274.82;
    document.getElementById('crit_dmg').value = 672.76;
}

// 獲取目前所有加總後的數值
function getFinalStats() {
    let s = {};
    keys.forEach(k => s[k.id] = parseFloat(document.getElementById(k.id).value) || 0);
    
    // 加算 Buff 數值
    if(document.getElementById('buff_shrimp').checked) s.boss_atk += 50;
    if(document.getElementById('buff_chicken').checked) s.boss_atk += 30;
    if(document.getElementById('buff_jelly').checked) s.boss_atk += 20;
    
    if(document.getElementById('buff_yogurt').checked) s.atk_inc += 50;
    if(document.getElementById('buff_buckwheat').checked) s.atk_inc += 30;
    
    if(document.getElementById('buff_chestnut').checked) s.crit_dmg += 30;
    
    if(document.getElementById('buff_candy').checked) s.dmg_inc += 30;
    if(document.getElementById('buff_pork').checked) s.dmg_inc += 20;
    
    return s;
}

function formula(s) {
    const base = s.atk * (s.skill_dmg / 100);
    const dmgInc = 1 + (s.dmg_inc / 100);
    const final = 1 + (s.final_dmg / 100) + (s.skill_final_dmg / 100);
    const atkBoss = 1 + (s.atk_inc / 100) + (s.skill_dmg / 100) * (s.boss_atk / 100);
    const crit = 1 + (s.crit_dmg / 100) + 0.2;
    return base * dmgInc * final * atkBoss * crit;
}

function calculate() {
    const stats = getFinalStats();
    const currentDmg = formula(stats);
    if(currentDmg === 0) { alert("請先輸入數值！"); return; }
    
    document.getElementById('total_damage_display').innerText = `總傷害期望值：${currentDmg.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
    const analysisBody = document.getElementById('analysis_body');
    analysisBody.innerHTML = '';

    const results = keys.map(k => {
        let t = { ...stats };
        t[k.id] += 1;
        let gain = ((formula(t) - currentDmg) / currentDmg) * 100;
        return { name: k.name, gain };
    }).sort((a, b) => b.gain - a.gain);

    results.forEach(res => {
        analysisBody.innerHTML += `<tr><td>${res.name} (+1 單位)</td><td class="${res.gain > 0.15 ? 'high-gain' : ''}">${res.gain.toFixed(4)}%</td></tr>`;
    });
    document.getElementById('results').style.display = 'block';
}

function compareEquip() {
    const baseStats = getFinalStats();
    const currentDmg = formula(baseStats);
    const typeA = document.getElementById('optA_type').value;
    const valA = parseFloat(document.getElementById('optA_val').value) || 0;
    const typeB = document.getElementById('optB_type').value;
    const valB = parseFloat(document.getElementById('optB_val').value) || 0;
    let statsA = { ...baseStats }; statsA[typeA] += valA;
    let statsB = { ...baseStats }; statsB[typeB] += valB;
    const dmgA = formula(statsA);
    const dmgB = formula(statsB);
    const gainA = ((dmgA - currentDmg) / currentDmg * 100).toFixed(2);
    const gainB = ((dmgB - currentDmg) / currentDmg * 100).toFixed(2);
    const winner = dmgA > dmgB ? "方案 A" : "方案 B";
    const diff = Math.abs(((dmgA - dmgB) / Math.min(dmgA, dmgB)) * 100).toFixed(2);
    const resDiv = document.getElementById('compare_result');
    resDiv.style.display = 'block';
    resDiv.innerHTML = `<strong>結論：${winner} 勝出！</strong><br>方案 A 提升：${gainA}% | 方案 B 提升：${gainB}%<br><span style="color: #c62828;">${winner} 比另一方案多出約 ${diff}% 的總傷害</span>`;
}
</script>
</body>
</html>
